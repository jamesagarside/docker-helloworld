# Deploy hello to Elastic Hub
# Hostname after first successful deploy: https://hello.tools.elastic.dev
#
# This workflow needs the following repository secrets
# (Settings -> Secrets and variables -> Actions):
#
#   WIF_PROVIDER  - terraform output user_project_wif_provider
#   DEPLOY_SA     - terraform output user_project_service_accounts['hello']
#   AR_HOST       - terraform output user_project_artifact_registry.host
#   AR_PROJECT    - terraform output user_project_artifact_registry.project
#   AR_REPO       - terraform output user_project_artifact_registry.repository
#
# The Hosting dashboard surfaces these values once Terraform has
# applied your deployment.

name: Deploy to Elastic Hub

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.AR_HOST }} --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${{ secrets.AR_HOST }}/${{ secrets.AR_PROJECT }}/${{ secrets.AR_REPO }}/hello:$GITHUB_SHA"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy hub-hello \
            --region=europe-west2 \
            --image=${{ steps.build.outputs.image }}
